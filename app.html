    // ELEVENLABS CONFIG via Vercel Proxy
    // ============================================
    const ELEVENLABS_PROXY = 'https://elevenlabs-proxy-kappa.vercel.app/api/tts';

    // ============================================
    // ENGLISH PHONETIC MAPPINGS
    // ============================================
    const PHONETIC_MAP = {
      'A': 'ay',
      'B': 'bee',
      'C': 'see',
      'D': 'dee',
      'E': 'ee',
      'F': 'eff',
      'G': 'jee',
      'H': 'aitch',
      'I': 'eye',
      'J': 'jay',
      'K': 'kay',
      'L': 'ell',
      'M': 'em',
      'N': 'en',
      'O': 'oh',
      'P': 'pee',
      'Q': 'cue',
      'R': 'are',
      'S': 'ess',
      'T': 'tee',
      'U': 'you',
      'V': 'vee',
      'W': 'double you',
      'X': 'ex',
      'Y': 'why',
      'Z': 'zee',
      '0': 'zero', '1': 'one', '2': 'two', '3': 'three', '4': 'four',
      '5': 'five', '6': 'six', '7': 'seven', '8': 'eight', '9': 'nine',
      '10': 'ten', '11': 'eleven', '12': 'twelve', '13': 'thirteen',
      '14': 'fourteen', '15': 'fifteen', '16': 'sixteen', '17': 'seventeen',
      '18': 'eighteen', '19': 'nineteen', '20': 'twenty'
    };

    // ============================================
    // AUDIO SERVICE - ElevenLabs via Proxy
    // ============================================
    const AudioService = {
      cache: new Map(),
      currentAudio: null,
      
      toPhonetic(text) {
        const upper = text.toUpperCase().trim();
        if (PHONETIC_MAP[upper]) return PHONETIC_MAP[upper];
        return text;
      },
      
      async speak(text) {
        const phoneticText = this.toPhonetic(text);
        
        // Stop current audio
        if (this.currentAudio) {
          this.currentAudio.pause();
          this.currentAudio = null;
        }

        // Check cache
        const cacheKey = phoneticText.toLowerCase().trim();
        if (this.cache.has(cacheKey)) {
          const audio = new Audio(this.cache.get(cacheKey));
          this.currentAudio = audio;
          await audio.play();
          return;
        }

        try {
          const response = await fetch(ELEVENLABS_PROXY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: phoneticText })
          });

          if (!response.ok) throw new Error('Proxy error');
          
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          this.cache.set(cacheKey, url);
          
          const audio = new Audio(url);
          this.currentAudio = audio;
          await audio.play();
        } catch (error) {
          console.error('Audio error:', error);
        }
      },

      stop() {
        if (this.currentAudio) {
          this.currentAudio.pause();
          this.currentAudio = null;
        }
      }
    };

        }
      });

      const completeLesson = (lessonId) => {
        if (!user.completedLessons.includes(lessonId)) {
          setUser(prev => ({
            ...prev,
            completedLessons: [...prev.completedLessons, lessonId],
            stars: prev.stars + 10,
            streak: prev.streak + 1
          }));
        }
      };

      const updateUserData = (data) => {
        setUser(prev => ({
          ...prev,
          userData: { ...prev.userData, ...data }
        }));
      };

      return (
        <AppContext.Provider value={{ user, setUser, completeLesson, updateUserData }}>
          {children}
        </AppContext.Provider>
      );
    }

      return (
        <button

    // ============================================
    // LESSON 1: ALPHABET
    // ============================================
    function AlphabetLesson({ onBack, onComplete }) {
      const [step, setStep] = useState(0);
      const { user, updateUserData, completeLesson } = useContext(AppContext);
      const totalSteps = 4;

      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      const pronunciations = {
        A:'ey', B:'bi', C:'si', D:'di', E:'i', F:'ef', G:'ci', H:'eyç',
        I:'ay', J:'cey', K:'key', L:'el', M:'em', N:'en', O:'ou', P:'pi',
        Q:'kyu', R:'ar', S:'es', T:'ti', U:'yu', V:'vi', W:'dablyu',
        X:'eks', Y:'vay', Z:'zi'
      };

      const spellName = (name) => {
        if (!name) return '';
        return name.toUpperCase().split('').join(' - ');
      };

      const handleComplete = () => {
        completeLesson('alphabet');
        onComplete();
      };

      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: theme.background }}>
          <LessonHeader
            title="Alphabet & Name"
            subtitle="Learn to spell your name"
            icon="🔤"
            color="#10b981"
            onBack={onBack}
            progress={step / totalSteps}
          />

          <div style={{ flex: 1, padding: '20px', overflowY: 'auto' }}>
            {step === 0 && (
              <div className="fade-in">
                {/* Intro */}
                <div style={{
                  background: theme.successLight,
                  borderRadius: '20px',
                  padding: '24px',
                  marginBottom: '24px',
                  textAlign: 'center'
                }}>
                  <div style={{ fontSize: '50px', marginBottom: '12px' }}>👩‍🏫</div>
                  <p style={{ fontSize: '16px', color: '#166534', lineHeight: '1.6' }}>
                    "Hi! I'm Maria. Today, we're going to learn the alphabet and how to spell your name. This is very important when you fill out forms or meet new people!"
                  </p>
                  <div style={{ marginTop: '16px' }}>
                    <AudioButton
                      text="Hi! I'm Maria. Today, we're going to learn the alphabet and how to spell your name."
                      label="🔊 Listen"
                      variant="primary"
                    />
                  </div>
                </div>

                <h3 style={{ fontSize: '17px', fontWeight: '700', marginBottom: '16px', color: theme.text }}>
                  Tap any letter to hear it:
                </h3>

                <div style={{
                  display: 'grid',
                  gridTemplateColumns: 'repeat(7, 1fr)',
                  gap: '8px',
                  marginBottom: '24px'
                }}>
                  {alphabet.map(letter => (
                    <TapCard
                      key={letter}
                      content={letter}
                      pronunciation={pronunciations[letter]}
                      size="small"
                    />
                  ))}
                </div>

                <div style={{
                  background: theme.secondaryLight,
                  padding: '16px',
                  borderRadius: '14px',
                  marginBottom: '24px'
                }}>
                  <p style={{ fontSize: '14px', color: '#92400e' }}>
                    ⚠️ <strong>Watch out!</strong> These letters sound similar: B/V, E/I, G/J
                  </p>
                </div>

                <button
                  onClick={() => setStep(1)}
                  style={{
                    width: '100%',
                    padding: '18px',
                    background: theme.primary,
                    color: 'white',
                    border: 'none',
                    borderRadius: '16px',
                    fontSize: '17px',
                    fontWeight: '700',
                    cursor: 'pointer'
                  }}
                >
                  Next: Enter Your Name →
                </button>
              </div>
            )}

            {step === 1 && (
              <div className="fade-in">
                <h3 style={{ fontSize: '17px', fontWeight: '700', marginBottom: '20px' }}>
                  Enter your name:

                <TextInput
                  label="First Name"
                  value={user.userData.firstName}

    // ============================================

    function NumbersLesson({ onBack, onComplete }) {
      const [step, setStep] = useState(0);
      const { user, updateUserData, completeLesson } = useContext(AppContext);
      const totalSteps = 4;

      const numbers = [...Array(21)].map((_, i) => i);
      const numberWords = ['zero','one','two','three','four','five','six','seven','eight','nine','ten',
        'eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen','twenty'];

      const formatPhone = (p) => {
        const d = p.replace(/\D/g, '').slice(0, 10);
        if (d.length >= 6) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
        if (d.length >= 3) return `(${d.slice(0,3)}) ${d.slice(3)}`;
        return d;
      };

      const phoneToWords = (p) => {
        return p.replace(/\D/g, '').split('').map(n => numberWords[parseInt(n)]).join(', ');
      };

      const handleComplete = () => {
        completeLesson('numbers');
        onComplete();
      };

      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: theme.background }}>
