<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Nunito', system-ui, sans-serif; 
      background: #faf9f7;
      color: #1f2937;
    }
    #root { 
      max-width: 500px; 
      margin: 0 auto; 
      min-height: 100vh; 
      background: #faf9f7;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(45, 166, 164, 0.3); } 50% { box-shadow: 0 0 20px rgba(45, 166, 164, 0.6); } }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    .slide-up { animation: slideUp 0.5s ease-out; }
    .pulse { animation: pulse 0.3s ease-out; }
    .bounce { animation: bounce 0.5s ease-out; }
    .glow { animation: glow 2s ease-in-out infinite; }
    .loading-spin { animation: spin 1s linear infinite; }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;

    // ============================================
    // ELEVENLABS CONFIG via Vercel Proxy
    // ============================================
    const ELEVENLABS_PROXY = 'https://elevenlabs-proxy-kappa.vercel.app/api/tts';

    // ============================================
    // ENGLISH PHONETIC MAPPINGS
    // ============================================
    const PHONETIC_MAP = {
      'A': 'ay',
      'B': 'bee',
      'C': 'see',
      'D': 'dee',
      'E': 'ee',
      'F': 'eff',
      'G': 'jee',
      'H': 'aitch',
      'I': 'eye',
      'J': 'jay',
      'K': 'kay',
      'L': 'ell',
      'M': 'em',
      'N': 'en',
      'O': 'oh',
      'P': 'pee',
      'Q': 'cue',
      'R': 'are',
      'S': 'ess',
      'T': 'tee',
      'U': 'you',
      'V': 'vee',
      'W': 'double you',
      'X': 'ex',
      'Y': 'why',
      'Z': 'zee',
      '0': 'zero', '1': 'one', '2': 'two', '3': 'three', '4': 'four',
      '5': 'five', '6': 'six', '7': 'seven', '8': 'eight', '9': 'nine',
      '10': 'ten', '11': 'eleven', '12': 'twelve', '13': 'thirteen',
      '14': 'fourteen', '15': 'fifteen', '16': 'sixteen', '17': 'seventeen',
      '18': 'eighteen', '19': 'nineteen', '20': 'twenty'
    };

    // ============================================
    // AUDIO SERVICE - ElevenLabs via Proxy
    // ============================================
    const AudioService = {
      cache: new Map(),
      currentAudio: null,
      
      toPhonetic(text) {
        const upper = text.toUpperCase().trim();
        if (PHONETIC_MAP[upper]) return PHONETIC_MAP[upper];
        return text;
      },
      
      async speak(text) {
        const phoneticText = this.toPhonetic(text);
        
        // Stop current audio
        if (this.currentAudio) {
          this.currentAudio.pause();
          this.currentAudio = null;
        }

        // Check cache
        const cacheKey = phoneticText.toLowerCase().trim();
        if (this.cache.has(cacheKey)) {
          const audio = new Audio(this.cache.get(cacheKey));
          this.currentAudio = audio;
          await audio.play();
          return;
        }

        try {
          const response = await fetch(ELEVENLABS_PROXY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: phoneticText })
          });

          if (!response.ok) throw new Error('Proxy error');
          
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          this.cache.set(cacheKey, url);
          
          const audio = new Audio(url);
          this.currentAudio = audio;
          await audio.play();
        } catch (error) {
          console.error('Audio error:', error);
        }
      },

      stop() {
        if (this.currentAudio) {
          this.currentAudio.pause();
          this.currentAudio = null;
        }
      }
    };

    // ============================================
    // THEME & COLORS (Lovable style)
    // ============================================
    const theme = {

      secondary: '#f5a623',    // Orange/Gold

      background: '#faf9f7',   // Cream
      surface: '#ffffff',
      text: '#1f2937',
      textLight: '#6b7280',
      textMuted: '#9ca3af',
      success: '#10b981',
      successLight: '#d1fae5',
      error: '#ef4444',
      border: '#e5e7eb',
      cardShadow: '0 2px 8px rgba(0,0,0,0.06)',
    };

    // ============================================
    // APP CONTEXT
    // ============================================
    const AppContext = createContext();

    function AppProvider({ children }) {
      const [user, setUser] = useState({
        name: 'Friend',
        streak: 0,
        stars: 0,
        completedLessons: [],
        userData: {
          firstName: '', middleName: '', lastName: '',
          phone: '',
          birthMonth: '', birthDay: '', birthYear: '',
          streetNumber: '', streetName: '', apartment: '', city: '', state: '', zip: '',
          country: '', nationality: ''
        }
      });

      const completeLesson = (lessonId) => {
        if (!user.completedLessons.includes(lessonId)) {
          setUser(prev => ({
            ...prev,
            completedLessons: [...prev.completedLessons, lessonId],
            stars: prev.stars + 10,
            streak: prev.streak + 1
          }));
        }
      };

      const updateUserData = (data) => {
        setUser(prev => ({
          ...prev,
          userData: { ...prev.userData, ...data }
        }));
      };

      return (
        <AppContext.Provider value={{ user, setUser, completeLesson, updateUserData }}>
          {children}
        </AppContext.Provider>
      );
    }

    // ============================================
    // MAIN APP
    // ============================================
    function App() {
      const [screen, setScreen] = useState('home');
      const [currentLesson, setCurrentLesson] = useState(null);

      return (
        <AppProvider>
          <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
            {screen === 'home' && (
              <HomeScreen 
                onStartLesson={(id) => { setCurrentLesson(id); setScreen('lesson'); }}
              />
            )}
            {screen === 'lesson' && (
              <LessonScreen 
                lessonId={currentLesson} 
                onBack={() => setScreen('home')}
                onComplete={() => setScreen('home')}
              />
            )}
          </div>
        </AppProvider>
      );
    }

    function LessonCard({ lesson, isCompleted, isLocked, onClick, delay }) {
      return (
        <button
          onClick={onClick}
          disabled={isLocked}
          className="fade-in"
          style={{
            animationDelay: `${delay}s`,

    // ============================================

    // ============================================
    function AlphabetLesson({ onBack, onComplete }) {
      const [step, setStep] = useState(0);
      const { user, updateUserData, completeLesson } = useContext(AppContext);
      const totalSteps = 4;

      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      const pronunciations = {
        A:'ey', B:'bi', C:'si', D:'di', E:'i', F:'ef', G:'ci', H:'eyç',
        I:'ay', J:'cey', K:'key', L:'el', M:'em', N:'en', O:'ou', P:'pi',
        Q:'kyu', R:'ar', S:'es', T:'ti', U:'yu', V:'vi', W:'dablyu',
        X:'eks', Y:'vay', Z:'zi'
      };

      const spellName = (name) => {
        if (!name) return '';
        return name.toUpperCase().split('').join(' - ');
      };

      const handleComplete = () => {
        completeLesson('alphabet');
        onComplete();

    function NumbersLesson({ onBack, onComplete }) {
      const [step, setStep] = useState(0);
      const { user, updateUserData, completeLesson } = useContext(AppContext);
      const totalSteps = 4;

        if (d.length >= 3) return `(${d.slice(0,3)}) ${d.slice(3)}`;
        return d;
