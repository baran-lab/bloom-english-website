// Audio
const AudioService={
  cache:new Map(),current:null,
  async speak(text){
    if(this.current)this.current.pause();
    if(this.cache.has(text)){this.current=this.cache.get(text).cloneNode();this.current.play();return}
    try{
      const r=await fetch('https://elevenlabs-proxy-kappa.vercel.app/api/tts',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text,voiceId:'EXAVITQu4vr4xnSDxMaL'})
      });
      if(r.ok){const b=await r.blob();const u=URL.createObjectURL(b);const a=new Audio(u);this.cache.set(text,a);this.current=a;a.play()}
    }catch(e){}
  }
};

// ========== CONTEXT ==========
const AppContext=createContext();
function AppProvider({children}){
  const[user,setUser]=useState(()=>{
    const s=localStorage.getItem('bloomV2');
    if(s)try{return JSON.parse(s)}catch(e){}
    return{xp:0,streak:0,hearts:5,completed:[],lang:null};
  });
  useEffect(()=>{localStorage.setItem('bloomV2',JSON.stringify(user))},[user]);
  const loseHeart=()=>setUser(p=>({...p,hearts:Math.max(0,p.hearts-1)}));
  const gainXP=(n)=>setUser(p=>({...p,xp:p.xp+n}));
  const complete=(id,xp)=>setUser(p=>({...p,completed:[...p.completed,id],xp:p.xp+xp,streak:p.streak+1}));
  const setLang=(l)=>setUser(p=>({...p,lang:l}));
  return <AppContext.Provider value={{user,loseHeart,gainXP,complete,setLang}}>{children}</AppContext.Provider>;
}

// ========== APP ==========
function App(){
  return <AppProvider><AppContent/></AppProvider>;
}

function AppContent(){
  const{user,setLang}=useContext(AppContext);
  const[screen,setScreen]=useState('home');
  const[lesson,setLesson]=useState(null);
  
  if(!user.lang)return <LangSelect onSelect={setLang}/>;
  if(screen==='lesson'&&lesson)return <Lesson data={lesson} onBack={()=>setScreen('home')} onDone={()=>setScreen('home')}/>;
  return <Home onStart={(l)=>{setLesson(l);setScreen('lesson')}}/>;
}

// ========== LESSON ==========
function Lesson({data,onBack,onDone}){
  const{user,loseHeart,gainXP,complete}=useContext(AppContext);
  const[step,setStep]=useState(0);
  const[result,setResult]=useState(null);
  const lang=user.lang;
  const showEng=data.showEnglish||false;
  const cur=data.steps[step];
  const progress=step/(data.steps.length-1)*100;

  const handleAnswer=(correct)=>{
    if(correct)gainXP(2);else loseHeart();
    setResult(correct);
  };
  const next=()=>{
    setResult(null);
    if(step<data.steps.length-1)setStep(step+1);
    else{complete(data.id,data.xp);onDone();}
  };

  if(user.hearts===0)return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:30,textAlign:'center'}}>
      <div style={{fontSize:80,marginBottom:20}}>💔</div>
      <h2 style={{fontSize:24,marginBottom:10}}>{lang==='tr'?'Kalbin Bitti!':lang==='es'?'¡Sin Corazones!':lang==='zh'?'没有心了！':'Out of Hearts!'}</h2>
      <p style={{color:theme.textLight,marginBottom:30}}>{lang==='tr'?'Daha sonra tekrar gel.':lang==='es'?'Vuelve más tarde.':lang==='zh'?'稍后再来。':'Come back later for more hearts.'}</p>
      <button onClick={onBack} style={{padding:'16px 40px',background:theme.accent,border:'none',borderRadius:25,color:'#fff',fontSize:16,fontWeight:600,cursor:'pointer'}}>{lang==='tr'?'Geri Dön':lang==='es'?'Volver':lang==='zh'?'返回':'Go Back'}</button>
    </div>
  );

  const[showQuit,setShowQuit]=useState(false);
  
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* Quit Confirmation Modal */}
      {showQuit&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}}>
          <div style={{background:theme.bgCard,borderRadius:20,padding:30,maxWidth:320,textAlign:'center'}}>
            <div style={{fontSize:50,marginBottom:16}}>😢</div>
            <h3 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{lang==='tr'?'Çıkmak istediğine emin misin?':lang==='es'?'¿Seguro que quieres salir?':lang==='zh'?'确定要退出吗？':'Are you sure you want to quit?'}</h3>
            <p style={{color:theme.textLight,marginBottom:24,fontSize:14}}>{lang==='tr'?'İlerlemenizi kaybedeceksiniz':lang==='es'?'Perderás tu progreso':lang==='zh'?'你将失去进度':'You will lose your progress'}</p>
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>setShowQuit(false)} style={{flex:1,padding:14,background:theme.primary,border:'none',borderRadius:12,color:'#fff',fontWeight:700,cursor:'pointer'}}>{lang==='tr'?'Devam Et':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue'}</button>
              <button onClick={onBack} style={{flex:1,padding:14,background:theme.danger,border:'none',borderRadius:12,color:'#fff',fontWeight:700,cursor:'pointer'}}>{lang==='tr'?'Çık':lang==='es'?'Salir':lang==='zh'?'退出':'Quit'}</button>
            </div>
          </div>
        </div>
      )}
      
      <div style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:16}}>
        <button onClick={()=>setShowQuit(true)} style={{background:theme.bgCard,border:'none',width:44,height:44,borderRadius:12,fontSize:20,cursor:'pointer',color:theme.text,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        <div style={{flex:1,height:12,background:theme.bgCard,borderRadius:6,overflow:'hidden'}}>
          <div style={{width:`${progress}%`,height:'100%',background:theme.primary,transition:'width .3s'}}/>
        </div>
        <span style={{color:theme.heart}}>❤️ {user.hearts}</span>
      </div>
      <div style={{flex:1,padding:20,overflowY:'auto'}}>
        {cur.type==='listen'&&<ListenStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='select'&&<SelectStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='build'&&<BuildStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='complete'&&<CompleteStep s={cur} lang={lang} showEng={showEng} xp={data.xp} onDone={onDone}/>}
      </div>
    </div>
  );
}

  const[sel,setSel]=useState(null);
  const[played,setPlayed]=useState(false);
  const play=()=>{AudioService.speak(s.audio);setPlayed(true)};
  const check=()=>{if(sel!==null)onAnswer(s.opts[sel].c)};
  
  return(
    <div className="fade-in">
      <div style={{background:theme.bgCard,borderRadius:20,padding:20,marginBottom:24}}>
        <div style={{fontSize:13,color:theme.textMuted,marginBottom:8}}>🗣️ {s.speaker}</div>
        <button onClick={play} className={played?'':'glow'} style={{width:'100%',padding:20,background:played?`${theme.primary}20`:theme.primary,border:'none',borderRadius:16,cursor:'pointer',color:played?theme.primary:'#fff',fontSize:18,fontWeight:700}}>
          🔊 {played?s.audio:(lang==='tr'?'Dinle':lang==='es'?'Escuchar':lang==='zh'?'听':'Listen')}
        </button>
      </div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>{showEng?s.q:(s.qTr?.[lang]||s.q)}</div>
      {s.hint&&<div style={{padding:12,background:`${theme.secondary}20`,borderRadius:12,marginBottom:16,fontSize:14,color:theme.secondary}}>{s.hint}</div>}
      <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
        {s.opts.map((o,i)=>{
          let bg=theme.bgCard,border='transparent';
          if(result!==null){
            if(o.c){bg=`${theme.correct}20`;border=theme.correct}
            else if(sel===i&&!o.c){bg=`${theme.wrong}20`;border=theme.wrong}
          }else if(sel===i)border=theme.accent;
          return(
            <button key={i} onClick={()=>!result&&setSel(i)} className={result!==null&&sel===i?(o.c?'bounce':'shake'):''} style={{padding:'16px 20px',background:bg,border:`2px solid ${border}`,borderRadius:14,cursor:result?'default':'pointer',textAlign:'left',color:theme.text}}>
              <div style={{fontWeight:600}}>{o.t}</div>
              {!showEng&&<div style={{fontSize:14,color:theme.textLight,marginTop:4}}>{LANGS[lang]?.flag} {o.tr?.[lang]}</div>}

          {showEng?'Check':(lang==='tr'?'Kontrol Et':lang==='es'?'Verificar':lang==='zh'?'检查':'Check')}
        </button>:
        <button onClick={onNext} style={{width:'100%',padding:18,background:result?theme.primary:theme.accent,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
          {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')}
        </button>
      }
    </div>
  );
}

// ========== BUILD STEP ==========
function BuildStep({s,lang,showEng,onAnswer,result,onNext}){
  const[sel,setSel]=useState([]);
  const[avail,setAvail]=useState([...s.words]);
  const add=(w,i)=>{if(result)return;setSel([...sel,w]);const a=[...avail];a.splice(i,1);setAvail(a)};
  const rem=(w,i)=>{if(result)return;const n=[...sel];n.splice(i,1);setSel(n);setAvail([...avail,w])};
  const check=()=>{onAnswer(sel.join(' ')===s.correct.join(' '))};
  const isCorrect=sel.join(' ')===s.correct.join(' ');
  
  return(
    <div className="fade-in">
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>{showEng?'Build the sentence:':(lang==='tr'?'Cümleyi oluştur:':lang==='es'?'Construye la oración:':lang==='zh'?'组成句子：':'Build the sentence:')}</div>
      <div style={{padding:12,background:`${theme.primary}10`,borderRadius:12,marginBottom:20,fontSize:15,color:theme.primary}}>{showEng?s.target:(LANGS[lang]?.flag+' '+(s.targetTr?.[lang]||s.target))}</div>
      <div style={{minHeight:80,background:theme.bgCard,borderRadius:16,padding:16,marginBottom:20,display:'flex',flexWrap:'wrap',gap:10,alignContent:'flex-start',border:result?`2px solid ${isCorrect?theme.correct:theme.wrong}`:'2px solid transparent'}}>
        {sel.length===0?<span style={{color:theme.textMuted}}>{showEng?'Tap words below...':(lang==='tr'?'Kelimelere dokun...':lang==='es'?'Toca las palabras...':lang==='zh'?'点击下面的词...':'Tap words below...')}</span>:
          sel.map((w,i)=><button key={i} onClick={()=>rem(w,i)} style={{padding:'10px 16px',background:theme.accent,border:'none',borderRadius:10,color:'#fff',fontSize:16,fontWeight:600,cursor:result?'default':'pointer'}}>{w}</button>)}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:24,justifyContent:'center'}}>
        {avail.map((w,i)=><button key={i} onClick={()=>add(w,i)} style={{padding:'10px 16px',background:theme.bgCard,border:`2px solid ${theme.textMuted}40`,borderRadius:10,color:theme.text,fontSize:16,fontWeight:600,cursor:result?'default':'pointer'}}>{w}</button>)}
      </div>
      {result!==null&&!isCorrect&&<div style={{padding:16,background:`${theme.correct}20`,borderRadius:12,marginBottom:20}}>
        <div style={{fontSize:14,color:theme.textMuted,marginBottom:4}}>{showEng?'Correct answer:':(lang==='tr'?'Doğru cevap:':lang==='es'?'Respuesta correcta:':lang==='zh'?'正确答案：':'Correct answer:')}</div>
        <div style={{fontSize:16,fontWeight:600,color:theme.correct}}>{s.correct.join(' ')}</div>
      </div>}
      {result===null?
        <button onClick={check} disabled={sel.length===0} style={{width:'100%',padding:18,background:sel.length===0?theme.textMuted:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:sel.length===0?'not-allowed':'pointer'}}>
          {showEng?'Check':(lang==='tr'?'Kontrol Et':lang==='es'?'Verificar':lang==='zh'?'检查':'Check')}
        </button>:
        <button onClick={onNext} style={{width:'100%',padding:18,background:isCorrect?theme.primary:theme.accent,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
          {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')}
        </button>
      }
    </div>
  );
}

// ========== COMPLETE STEP ==========
function CompleteStep({s,lang,showEng,xp,onDone}){
  return(
    <div className="fade-in" style={{textAlign:'center',paddingTop:40}}>
      <div style={{fontSize:80,marginBottom:20}}>🎉</div>
      <h2 style={{fontSize:28,fontWeight:800,marginBottom:10,color:theme.primary}}>{showEng?'Lesson Complete!':(lang==='tr'?'Ders Tamamlandı!':lang==='es'?'¡Lección Completada!':lang==='zh'?'课程完成！':'Lesson Complete!')}</h2>
      <div style={{display:'flex',justifyContent:'center',gap:30,marginBottom:30}}>
        <div><div style={{fontSize:32,fontWeight:800,color:theme.secondary}}>+{xp}</div><div style={{fontSize:14,color:theme.textLight}}>XP</div></div>
        <div><div style={{fontSize:32}}>🔥</div><div style={{fontSize:14,color:theme.textLight}}>Streak!</div></div>
      </div>
      <div style={{background:theme.bgCard,borderRadius:20,padding:20,marginBottom:30,textAlign:'left'}}>
        <div style={{fontWeight:700,marginBottom:12,color:theme.textLight}}>{showEng?'You learned:':(lang==='tr'?'Öğrendiklerin:':lang==='es'?'Aprendiste:':lang==='zh'?'你学到了：':'You learned:')}</div>
        {s.learned.map((item,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<s.learned.length-1?`1px solid ${theme.textMuted}20`:'none'}}>
            <span style={{color:theme.correct}}>✓</span>
            <div>
              <div style={{fontWeight:600}}>{item}</div>
              {!showEng&&<div style={{fontSize:14,color:theme.primary}}>{s.learnedTr?.[lang]?.[i]||''}</div>}
            </div>
          </div>
        ))}
      </div>
      <button onClick={onDone} className="glow" style={{width:'100%',padding:18,background:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
        {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')}
      </button>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
