  cache:new Map(),current:null,
  async speak(text){
    if(this.current)this.current.pause();
    if(this.cache.has(text)){this.current=this.cache.get(text).cloneNode();this.current.play();return}
    try{
      const r=await fetch('https://elevenlabs-proxy-kappa.vercel.app/api/tts',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text,voiceId:'EXAVITQu4vr4xnSDxMaL'})
      });
      if(r.ok){const b=await r.blob();const u=URL.createObjectURL(b);const a=new Audio(u);this.cache.set(text,a);this.current=a;a.play()}
    }catch(e){}
  }
};

// ========== CONTEXT ==========
const AppContext=createContext();
function AppProvider({children}){
  const[user,setUser]=useState(()=>{
    const s=localStorage.getItem('bloomV2');
    if(s)try{return JSON.parse(s)}catch(e){}
    return{xp:0,streak:0,hearts:5,completed:[],lang:null,name:'',dailyTasks:[],macroWins:[]};
  });
  useEffect(()=>{localStorage.setItem('bloomV2',JSON.stringify(user))},[user]);
  const loseHeart=()=>setUser(p=>({...p,hearts:Math.max(0,p.hearts-1)}));
  const gainXP=(n)=>setUser(p=>({...p,xp:p.xp+n}));
  const complete=(id,xp)=>setUser(p=>({...p,completed:[...p.completed,id],xp:p.xp+xp,streak:p.streak+1}));
  const setLang=(l)=>setUser(p=>({...p,lang:l}));
  const setName=(n)=>setUser(p=>({...p,name:n}));
  const addMacroWin=(w)=>setUser(p=>({...p,macroWins:[...(p.macroWins||[]),{text:w,date:new Date().toISOString()}]}));
  const toggleDailyTask=(id)=>setUser(p=>{
    const tasks=p.dailyTasks||[];
    const today=new Date().toDateString();
    const existing=tasks.find(t=>t.id===id&&t.date===today);
    if(existing)return{...p,dailyTasks:tasks.filter(t=>!(t.id===id&&t.date===today))};
    return{...p,dailyTasks:[...tasks,{id,date:today}]};
  });
  return <AppContext.Provider value={{user,loseHeart,gainXP,complete,setLang,setName,addMacroWin,toggleDailyTask}}>{children}</AppContext.Provider>;
}

// ========== APP ==========
function App(){
  return <AppProvider><AppContent/></AppProvider>;
}

function AppContent(){
  const{user,setLang,setName}=useContext(AppContext);
  const[screen,setScreen]=useState('home');
  const[lesson,setLesson]=useState(null);
  
  if(!user.lang)return <LangSelect onSelect={setLang}/>;
  if(!user.name)return <NameInput onSet={setName} lang={user.lang}/>;
  if(screen==='lesson'&&lesson)return <Lesson data={lesson} onBack={()=>setScreen('home')} onDone={()=>setScreen('home')}/>;
  return <Home onStart={(l)=>{setLesson(l);setScreen('lesson')}}/>;
}

// ========== LESSON ==========
function Lesson({data,onBack,onDone}){
  const{user,loseHeart,gainXP,complete}=useContext(AppContext);
  const[step,setStep]=useState(0);
  const[result,setResult]=useState(null);
  const lang=user.lang;
  const showEng=data.showEnglish||false;
  const cur=data.steps[step];
  const progress=step/(data.steps.length-1)*100;

  const[toast,setToast]=useState(null);
  
  const handleAnswer=(correct)=>{
    if(correct){
      gainXP(2);
      // Micro win - random encouragement
      const microWins={
        tr:[`Bravo, ${user.name}! 🌸`,`Harikasın, ${user.name}!`,`Devam et, ${user.name}!`,`Çok güzel!`],
        es:[`¡Bravo, ${user.name}! 🌸`,`¡Eres genial, ${user.name}!`,`¡Sigue así, ${user.name}!`,`¡Muy bien!`],
        zh:[`太好了，${user.name}！🌸`,`你真棒，${user.name}！`,`继续，${user.name}！`,`很好！`],
        ko:[`잘했어요, ${user.name}! 🌸`,`훌륭해요, ${user.name}!`,`계속해요, ${user.name}!`,`좋아요!`],
        ar:[`أحسنت، ${user.name}! 🌸`,`رائع، ${user.name}!`,`استمر، ${user.name}!`,`ممتاز!`],
        en:[`Bravo, ${user.name}! 🌸`,`You're amazing, ${user.name}!`,`Keep going, ${user.name}!`,`Excellent!`]
      };
      const msgs=microWins[lang]||microWins.en;
      setToast({type:'win',msg:msgs[Math.floor(Math.random()*msgs.length)]});
    }else{
      loseHeart();
      // Empathic error message
      const empathicMsgs={
        tr:[`Denemen güzel, ${user.name}!`,`Sorun değil, ${user.name}, tekrar dene.`,`İngilizce öğrenmek zaman alır, ${user.name}.`,`Başaracaksın, ${user.name}!`],
        es:[`¡Buen intento, ${user.name}!`,`No pasa nada, ${user.name}, inténtalo de nuevo.`,`Aprender inglés toma tiempo, ${user.name}.`,`¡Lo lograrás, ${user.name}!`],
        zh:[`好尝试，${user.name}！`,`没关系，${user.name}，再试一次。`,`学英语需要时间，${user.name}。`,`你会成功的，${user.name}！`],
        ko:[`좋은 시도예요, ${user.name}!`,`괜찮아요, ${user.name}, 다시 시도해보세요.`,`영어를 배우는 데 시간이 걸려요, ${user.name}.`,`해낼 수 있어요, ${user.name}!`],
        ar:[`محاولة جيدة، ${user.name}!`,`لا بأس، ${user.name}، حاول مرة أخرى.`,`تعلم الإنجليزية يستغرق وقتًا، ${user.name}.`,`ستنجح، ${user.name}!`],
        en:[`Good try, ${user.name}!`,`It's okay, ${user.name}, try again.`,`Learning English takes time, ${user.name}.`,`You'll get it, ${user.name}!`]
      };
      const msgs=empathicMsgs[lang]||empathicMsgs.en;
      setToast({type:'empathy',msg:msgs[Math.floor(Math.random()*msgs.length)]});
    }
    setResult(correct);
    setTimeout(()=>setToast(null),2500);
  };
  const next=()=>{
    setResult(null);
    if(step<data.steps.length-1)setStep(step+1);
    else{complete(data.id,data.xp);onDone();}
  };

  if(user.hearts===0)return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:30,textAlign:'center'}}>
      <div style={{fontSize:80,marginBottom:20}}>💔</div>
      <h2 style={{fontSize:24,marginBottom:10}}>{lang==='tr'?'Kalbin Bitti!':lang==='es'?'¡Sin Corazones!':lang==='zh'?'没有心了！':'Out of Hearts!'}</h2>
      <p style={{color:theme.textLight,marginBottom:30}}>{lang==='tr'?'Daha sonra tekrar gel.':lang==='es'?'Vuelve más tarde.':lang==='zh'?'稍后再来。':'Come back later for more hearts.'}</p>
      <button onClick={onBack} style={{padding:'16px 40px',background:theme.accent,border:'none',borderRadius:25,color:'#fff',fontSize:16,fontWeight:600,cursor:'pointer'}}>{lang==='tr'?'Geri Dön':lang==='es'?'Volver':lang==='zh'?'返回':'Go Back'}</button>
    </div>
  );

  const[showQuit,setShowQuit]=useState(false);
  
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {/* Toast notification (micro win / empathy) */}
      {toast&&(
        <div className="fade-in" style={{position:'fixed',top:80,left:'50%',transform:'translateX(-50%)',zIndex:200,background:toast.type==='win'?theme.primary:theme.accent,padding:'12px 22px',borderRadius:30,color:'#fff',fontWeight:700,fontSize:15,boxShadow:'0 4px 20px rgba(0,0,0,0.5)',display:'flex',alignItems:'center',gap:8,maxWidth:'90vw'}}>
          <span style={{fontSize:22}}>🌸</span>
          <span>{toast.msg}</span>
        </div>
      )}
      
      {/* Quit Confirmation Modal */}
      {showQuit&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}}>
          <div style={{background:theme.bgCard,borderRadius:20,padding:30,maxWidth:320,textAlign:'center'}}>
            <div style={{fontSize:50,marginBottom:16}}>😢</div>
            <h3 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{lang==='tr'?'Çıkmak istediğine emin misin?':lang==='es'?'¿Seguro que quieres salir?':lang==='zh'?'确定要退出吗？':'Are you sure you want to quit?'}</h3>
            <p style={{color:theme.textLight,marginBottom:24,fontSize:14}}>{lang==='tr'?'İlerlemenizi kaybedeceksiniz':lang==='es'?'Perderás tu progreso':lang==='zh'?'你将失去进度':'You will lose your progress'}</p>
            <div style={{display:'flex',gap:12}}>
              <button onClick={()=>setShowQuit(false)} style={{flex:1,padding:14,background:theme.primary,border:'none',borderRadius:12,color:'#fff',fontWeight:700,cursor:'pointer'}}>{lang==='tr'?'Devam Et':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue'}</button>
              <button onClick={onBack} style={{flex:1,padding:14,background:theme.danger,border:'none',borderRadius:12,color:'#fff',fontWeight:700,cursor:'pointer'}}>{lang==='tr'?'Çık':lang==='es'?'Salir':lang==='zh'?'退出':'Quit'}</button>
            </div>
          </div>
        </div>
      )}
      
      <div style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:16}}>
        <button onClick={()=>setShowQuit(true)} style={{background:theme.bgCard,border:'none',width:44,height:44,borderRadius:12,fontSize:20,cursor:'pointer',color:theme.text,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        <div style={{flex:1,height:12,background:theme.bgCard,borderRadius:6,overflow:'hidden'}}>
          <div style={{width:`${progress}%`,height:'100%',background:theme.primary,transition:'width .3s'}}/>
        </div>
        <span style={{color:theme.heart}}>❤️ {user.hearts}</span>
      </div>
      <div style={{flex:1,padding:20,overflowY:'auto'}}>
        {cur.type==='listen'&&<ListenStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='select'&&<SelectStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='build'&&<BuildStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='vocab_card'&&<VocabCardStep s={cur} lang={lang} showEng={showEng} onNext={()=>{gainXP(3);next()}}/>}
        {cur.type==='video'&&<VideoStep s={cur} lang={lang} showEng={showEng} onNext={()=>{gainXP(3);next()}}/>}
        {cur.type==='match_info'&&<MatchInfoStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='fill_blank_audio'&&<FillBlankAudioStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='listen_answer'&&<ListenAnswerStep s={cur} lang={lang} showEng={showEng} onAnswer={handleAnswer} result={result} onNext={next}/>}
        {cur.type==='complete'&&<CompleteStep s={cur} lang={lang} showEng={showEng} xp={data.xp} onDone={onDone}/>}
      </div>
    </div>
  );
}

// ========== LISTEN STEP ==========
function ListenStep({s,lang,showEng,onAnswer,result,onNext}){
  const[sel,setSel]=useState(null);
  const[played,setPlayed]=useState(false);
  const play=()=>{AudioService.speak(s.audio);setPlayed(true)};
  const check=()=>{if(sel!==null)onAnswer(s.opts[sel].c)};
  
  return(
    <div className="fade-in">
      <div style={{background:theme.bgCard,borderRadius:20,padding:20,marginBottom:24}}>
        <div style={{fontSize:13,color:theme.textMuted,marginBottom:8}}>🗣️ {s.speaker}</div>
        <button onClick={play} className={played?'':'glow'} style={{width:'100%',padding:20,background:played?`${theme.primary}20`:theme.primary,border:'none',borderRadius:16,cursor:'pointer',color:played?theme.primary:'#fff',fontSize:18,fontWeight:700}}>
          🔊 {played?s.audio:(lang==='tr'?'Dinle':lang==='es'?'Escuchar':lang==='zh'?'听':'Listen')}
        </button>
      </div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>{showEng?s.q:(s.qTr?.[lang]||s.q)}</div>
      {s.hint&&<div style={{padding:12,background:`${theme.secondary}20`,borderRadius:12,marginBottom:16,fontSize:14,color:theme.secondary}}>{s.hint}</div>}
      <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
        {s.opts.map((o,i)=>{
          let bg=theme.bgCard,border='transparent';
          if(result!==null){
            if(o.c){bg=`${theme.correct}20`;border=theme.correct}
            else if(sel===i&&!o.c){bg=`${theme.wrong}20`;border=theme.wrong}
          }else if(sel===i)border=theme.accent;
          return(
            <button key={i} onClick={()=>!result&&setSel(i)} className={result!==null&&sel===i?(o.c?'bounce':'shake'):''} style={{padding:'16px 20px',background:bg,border:`2px solid ${border}`,borderRadius:14,cursor:result?'default':'pointer',textAlign:'left',color:theme.text}}>
              <div style={{fontWeight:600}}>{o.t}</div>
              {!showEng&&<div style={{fontSize:14,color:theme.textLight,marginTop:4}}>{LANGS[lang]?.flag} {o.tr?.[lang]}</div>}
            </button>
          );
        })}
      </div>
      {result===null?
        <button onClick={check} disabled={sel===null} style={{width:'100%',padding:18,background:sel===null?theme.textMuted:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:sel===null?'not-allowed':'pointer'}}>
          {showEng?'Check':(lang==='tr'?'Kontrol Et':lang==='es'?'Verificar':lang==='zh'?'检查':'Check')}
        </button>:
        <button onClick={onNext} style={{width:'100%',padding:18,background:result?theme.primary:theme.accent,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
          {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')}
        </button>
      }
    </div>
  );
}

// ========== SELECT STEP ==========
function SelectStep({s,lang,showEng,onAnswer,result,onNext}){
  const[sel,setSel]=useState(null);
  const check=()=>{if(sel!==null)onAnswer(s.opts[sel].c)};
  
  return(
    <div className="fade-in">
      <div style={{fontSize:18,fontWeight:700,marginBottom:20}}>{showEng?s.instr:(s.instrTr?.[lang]||s.instr)}</div>
      <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
        {s.opts.map((o,i)=>{
          let bg=theme.bgCard,border='transparent';
          if(result!==null){
            if(o.c){bg=`${theme.correct}20`;border=theme.correct}
            else if(sel===i&&!o.c){bg=`${theme.wrong}20`;border=theme.wrong}
          }else if(sel===i)border=theme.accent;
          return(
            <button key={i} onClick={()=>!result&&setSel(i)} className={result!==null&&sel===i?(o.c?'bounce':'shake'):''} style={{padding:'16px 20px',background:bg,border:`2px solid ${border}`,borderRadius:14,cursor:result?'default':'pointer',textAlign:'left',color:theme.text}}>
              <div style={{fontWeight:600}}>{o.t}</div>
              {!showEng&&<div style={{fontSize:14,color:theme.textLight,marginTop:4}}>{LANGS[lang]?.flag} {o.tr?.[lang]}</div>}
              {result&&o.c&&<button onClick={(e)=>{e.stopPropagation();AudioService.speak(o.t)}} style={{marginTop:10,padding:'8px 16px',background:theme.correct,border:'none',borderRadius:20,color:'#fff',fontSize:14,cursor:'pointer'}}>🔊 {showEng?'Listen & Repeat':(lang==='tr'?'Dinle ve Tekrarla':lang==='es'?'Escucha y Repite':lang==='zh'?'听并重复':'Listen & Repeat')}</button>}
            </button>
          );
        })}
      </div>
      {s.teachMoment&&result&&s.opts[sel]?.c&&<div style={{padding:16,background:`${theme.secondary}20`,borderRadius:14,marginBottom:20,border:`1px solid ${theme.secondary}40`}}>
        <div style={{fontWeight:700,color:theme.secondary,marginBottom:8}}>💡 {showEng?'Pro Tip':(lang==='tr'?'İpucu':lang==='es'?'Consejo':lang==='zh'?'小贴士':'Pro Tip')}</div>
        <div style={{fontSize:14}}>{showEng?"When you don't understand, ask 'What does ___ mean?'":(lang==='tr'?"Anlamadığında 'What does ___ mean?' diye sor!":lang==='es'?"Cuando no entiendas, pregunta '¿Qué significa ___?'":lang==='zh'?"听不懂时问'What does ___ mean?'":"When you don't understand, ask 'What does ___ mean?'")}</div>
      </div>}
      {result===null?
        <button onClick={check} disabled={sel===null} style={{width:'100%',padding:18,background:sel===null?theme.textMuted:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:sel===null?'not-allowed':'pointer'}}>
          {showEng?'Check':(lang==='tr'?'Kontrol Et':lang==='es'?'Verificar':lang==='zh'?'检查':'Check')}
        </button>:
        <button onClick={onNext} style={{width:'100%',padding:18,background:result?theme.primary:theme.accent,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
          {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')}
        </button>
      }
    </div>
  );
}

// ========== BUILD STEP ==========
function BuildStep({s,lang,showEng,onAnswer,result,onNext}){
  const[sel,setSel]=useState([]);
  const[avail,setAvail]=useState([...s.words]);
  const add=(w,i)=>{if(result)return;setSel([...sel,w]);const a=[...avail];a.splice(i,1);setAvail(a)};
  const rem=(w,i)=>{if(result)return;const n=[...sel];n.splice(i,1);setSel(n);setAvail([...avail,w])};
  const check=()=>{onAnswer(sel.join(' ')===s.correct.join(' '))};
  const isCorrect=sel.join(' ')===s.correct.join(' ');
  
  return(
    <div className="fade-in">
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>{showEng?'Build the sentence:':(lang==='tr'?'Cümleyi oluştur:':lang==='es'?'Construye la oración:':lang==='zh'?'组成句子：':'Build the sentence:')}</div>
      <div style={{padding:12,background:`${theme.primary}10`,borderRadius:12,marginBottom:20,fontSize:15,color:theme.primary}}>{showEng?s.target:(LANGS[lang]?.flag+' '+(s.targetTr?.[lang]||s.target))}</div>
      <div style={{minHeight:80,background:theme.bgCard,borderRadius:16,padding:16,marginBottom:20,display:'flex',flexWrap:'wrap',gap:10,alignContent:'flex-start',border:result?`2px solid ${isCorrect?theme.correct:theme.wrong}`:'2px solid transparent'}}>
        {sel.length===0?<span style={{color:theme.textMuted}}>{showEng?'Tap words below...':(lang==='tr'?'Kelimelere dokun...':lang==='es'?'Toca las palabras...':lang==='zh'?'点击下面的词...':'Tap words below...')}</span>:
          sel.map((w,i)=><button key={i} onClick={()=>rem(w,i)} style={{padding:'10px 16px',background:theme.accent,border:'none',borderRadius:10,color:'#fff',fontSize:16,fontWeight:600,cursor:result?'default':'pointer'}}>{w}</button>)}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:10,marginBottom:24,justifyContent:'center'}}>
        {avail.map((w,i)=><button key={i} onClick={()=>add(w,i)} style={{padding:'10px 16px',background:theme.bgCard,border:`2px solid ${theme.textMuted}40`,borderRadius:10,color:theme.text,fontSize:16,fontWeight:600,cursor:result?'default':'pointer'}}>{w}</button>)}
      </div>
      {result!==null&&!isCorrect&&<div style={{padding:16,background:`${theme.correct}20`,borderRadius:12,marginBottom:20}}>
        <div style={{fontSize:14,color:theme.textMuted,marginBottom:4}}>{showEng?'Correct answer:':(lang==='tr'?'Doğru cevap:':lang==='es'?'Respuesta correcta:':lang==='zh'?'正确答案：':'Correct answer:')}</div>
        <div style={{fontSize:16,fontWeight:600,color:theme.correct}}>{s.correct.join(' ')}</div>
      </div>}
      {result===null?
        <button onClick={check} disabled={sel.length===0} style={{width:'100%',padding:18,background:sel.length===0?theme.textMuted:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:sel.length===0?'not-allowed':'pointer'}}>
          {showEng?'Check':(lang==='tr'?'Kontrol Et':lang==='es'?'Verificar':lang==='zh'?'检查':'Check')}
        </button>:
        <button onClick={onNext} style={{width:'100%',padding:18,background:isCorrect?theme.primary:theme.accent,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
          {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')}
        </button>
      }
    </div>
  );
}

// ========== VOCAB CARD STEP - Tap to hear, tap to show translation ==========
function VocabCardStep({s,lang,showEng,onNext}){
  const[idx,setIdx]=useState(0);
  const[showTr,setShowTr]=useState(false);
  const word=s.words[idx];
  const isLast=idx===s.words.length-1;
  
  const play=()=>AudioService.speak(word.en);
  const nextWord=()=>{
    if(isLast){onNext();return}
    setIdx(idx+1);
    setShowTr(false);
  };
  
  return(
    <div className="fade-in">
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{fontSize:14,color:theme.textLight,marginBottom:4}}>{showEng?s.title:(s.titleTr?.[lang]||s.title)}</div>
        <div style={{fontSize:13,color:theme.textMuted}}>{idx+1} / {s.words.length}</div>
      </div>
      
      <div style={{background:theme.bgCard,borderRadius:24,padding:40,textAlign:'center',marginBottom:20,minHeight:280,display:'flex',flexDirection:'column',justifyContent:'center'}}>
        <div style={{fontSize:36,fontWeight:800,marginBottom:20,color:theme.primary}}>{word.en}</div>
        
        <button onClick={play} style={{padding:'14px 28px',background:theme.primary,border:'none',borderRadius:30,color:'#fff',fontSize:16,fontWeight:700,cursor:'pointer',marginBottom:20,alignSelf:'center'}}>
          🔊 {showEng?'Listen':(lang==='tr'?'Dinle':lang==='es'?'Escuchar':lang==='zh'?'听':'Listen')}
        </button>
        
        {!showTr?
          <button onClick={()=>setShowTr(true)} style={{padding:'10px 20px',background:'transparent',border:`2px solid ${theme.accent}`,borderRadius:20,color:theme.accent,fontSize:14,fontWeight:600,cursor:'pointer',alignSelf:'center'}}>
            {LANGS[lang]?.flag} {showEng?'Show translation':(lang==='tr'?'Çeviriyi göster':lang==='es'?'Ver traducción':lang==='zh'?'显示翻译':'Show translation')}
          </button>
          :
          <div style={{fontSize:24,color:theme.accent,fontWeight:600,padding:'12px',background:`${theme.accent}10`,borderRadius:12}}>
            {LANGS[lang]?.flag} {word.tr?.[lang]||''}
          </div>
        }
      </div>
      
      <button onClick={nextWord} style={{width:'100%',padding:18,background:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
        {isLast?(showEng?'Finish':(lang==='tr'?'Bitir':lang==='es'?'Terminar':lang==='zh'?'完成':'Finish')):(showEng?'Next word':(lang==='tr'?'Sonraki':lang==='es'?'Siguiente':lang==='zh'?'下一个':'Next'))} →
      </button>
    </div>
  );
}

// ========== VIDEO STEP ==========
function VideoStep({s,lang,showEng,onNext}){
  const[watched,setWatched]=useState(false);
  
  return(
    <div className="fade-in">
      <div style={{fontSize:20,fontWeight:700,marginBottom:8,textAlign:'center'}}>{showEng?s.title:(s.titleTr?.[lang]||s.title)}</div>
      <div style={{fontSize:14,color:theme.textLight,marginBottom:20,textAlign:'center'}}>{showEng?s.intro:(s.introTr?.[lang]||s.intro)}</div>
      
      <div style={{background:'#000',borderRadius:16,overflow:'hidden',marginBottom:20}}>
        <video 
          controls 
          onEnded={()=>setWatched(true)}
          onPlay={()=>setWatched(true)}
          style={{width:'100%',display:'block'}}
          src={s.videoUrl}
        >
          Your browser does not support video playback.
        </video>
      </div>
      
      <button onClick={onNext} style={{width:'100%',padding:18,background:watched?theme.primary:theme.textMuted,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
        {watched?(showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')):(showEng?'Watch the video first':(lang==='tr'?'Önce videoyu izle':lang==='es'?'Mira el video primero':lang==='zh'?'先看视频':'Watch first'))} →
      </button>
    </div>
  );
}

// ========== MATCH INFO STEP ==========
function MatchInfoStep({s,lang,showEng,onAnswer,result,onNext}){
  const[matches,setMatches]=useState({});
  const[selectedQ,setSelectedQ]=useState(null);
  const[shuffledAnswers]=useState(()=>[...s.pairs].sort(()=>Math.random()-0.5));
  const[checked,setChecked]=useState(false);
  
  const handleQClick=(qIdx)=>{
    if(checked)return;
    if(matches[qIdx]!==undefined){
      const newMatches={...matches};
      delete newMatches[qIdx];
      setMatches(newMatches);
      return;
    }
    setSelectedQ(qIdx);
  };
  
  const handleAClick=(aIdx)=>{
    if(checked)return;
    if(selectedQ===null)return;
    const alreadyMatched=Object.values(matches).includes(aIdx);
    if(alreadyMatched)return;
    setMatches({...matches,[selectedQ]:aIdx});
    setSelectedQ(null);
  };
  
  const allMatched=Object.keys(matches).length===s.pairs.length;
  
  const check=()=>{
    const correct=s.pairs.every((p,i)=>shuffledAnswers[matches[i]]?.a===p.a);
    setChecked(true);
    onAnswer(correct);
  };
  
  return(
    <div className="fade-in">
      <div style={{fontSize:18,fontWeight:700,marginBottom:16,textAlign:'center'}}>{showEng?s.title:(s.titleTr?.[lang]||s.title)}</div>
      
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
        {/* Questions */}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {s.pairs.map((p,i)=>{
            const matched=matches[i]!==undefined;
            const isSel=selectedQ===i;
            const isCorrect=checked&&shuffledAnswers[matches[i]]?.a===p.a;
            const isWrong=checked&&matched&&shuffledAnswers[matches[i]]?.a!==p.a;
            return(
              <button key={i} onClick={()=>handleQClick(i)} style={{padding:'12px 10px',background:isCorrect?`${theme.correct}30`:isWrong?`${theme.wrong}30`:matched?`${theme.accent}30`:isSel?theme.accent:theme.bgCard,border:`2px solid ${isCorrect?theme.correct:isWrong?theme.wrong:matched||isSel?theme.accent:'transparent'}`,borderRadius:12,color:theme.text,fontSize:13,fontWeight:600,cursor:checked?'default':'pointer',textAlign:'left',minHeight:60}}>
                <div>{p.q}</div>
                {!showEng&&p.qTr?.[lang]&&<div style={{fontSize:11,color:theme.textLight,marginTop:2,fontWeight:400}}>{p.qTr[lang]}</div>}
                {matched&&<div style={{fontSize:12,color:theme.primary,marginTop:4,fontWeight:700}}>→ {shuffledAnswers[matches[i]]?.a}</div>}
              </button>
            );
          })}
        </div>
        {/* Answers */}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {shuffledAnswers.map((p,i)=>{
            const used=Object.values(matches).includes(i);
            return(
              <button key={i} onClick={()=>handleAClick(i)} disabled={used} style={{padding:'12px 10px',background:used?theme.bgCard+'80':theme.bgCard,border:`2px solid ${selectedQ!==null&&!used?theme.secondary:'transparent'}`,borderRadius:12,color:used?theme.textMuted:theme.text,fontSize:13,fontWeight:600,cursor:used||checked?'default':'pointer',textAlign:'left',minHeight:60,opacity:used?0.5:1}}>
                {p.a}
              </button>
            );
          })}
        </div>
      </div>
      
      {!checked?
        <button onClick={check} disabled={!allMatched} style={{width:'100%',padding:18,background:allMatched?theme.primary:theme.textMuted,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:allMatched?'pointer':'not-allowed'}}>
          {showEng?'Check':(lang==='tr'?'Kontrol Et':lang==='es'?'Verificar':lang==='zh'?'检查':'Check')}
        </button>
        :
        <button onClick={onNext} style={{width:'100%',padding:18,background:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
          {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')} →
        </button>
      }
    </div>
  );
}

// ========== FILL BLANK AUDIO STEP ==========
function FillBlankAudioStep({s,lang,showEng,onAnswer,result,onNext}){
  const[answer,setAnswer]=useState('');
  const[played,setPlayed]=useState(false);
  
  const play=()=>{AudioService.speak(s.audio);setPlayed(true)};
  
  const check=()=>{
    const trimmed=answer.trim();
    const ok=s.acceptable.includes(trimmed)||s.acceptable.map(a=>a.toLowerCase()).includes(trimmed.toLowerCase());
    onAnswer(ok);
  };
  
  const parts=s.sentence.split('___');
  
  return(
    <div className="fade-in">
      <div style={{fontSize:16,color:theme.textLight,marginBottom:16,textAlign:'center'}}>
        {showEng?'🔊 Listen and fill in the blank':(lang==='tr'?'🔊 Dinle ve boşluğu doldur':lang==='es'?'🔊 Escucha y completa':lang==='zh'?'🔊 听并填空':'Listen and fill')}
      </div>
      
      <button onClick={play} className={played?'':'glow'} style={{width:'100%',padding:18,background:played?`${theme.primary}20`:theme.primary,border:'none',borderRadius:16,cursor:'pointer',color:played?theme.primary:'#fff',fontSize:18,fontWeight:700,marginBottom:20}}>
        🔊 {played?s.audio:(showEng?'Listen':(lang==='tr'?'Dinle':lang==='es'?'Escuchar':lang==='zh'?'听':'Listen'))}
      </button>
      
      {played&&<div style={{padding:12,background:`${theme.accent}20`,borderRadius:12,marginBottom:16,fontSize:14,color:theme.accent,textAlign:'center'}}>{LANGS[lang]?.flag} {s.translation?.[lang]||''}</div>}
      
      <div style={{background:theme.bgCard,borderRadius:16,padding:20,marginBottom:20}}>
        <div style={{fontSize:20,textAlign:'center',lineHeight:1.8}}>
          {parts[0]}
          <input 
            type="text" 
            value={answer}
            onChange={(e)=>setAnswer(e.target.value)}
            disabled={result!==null}
            style={{display:'inline-block',padding:'6px 14px',background:theme.bg,border:`2px solid ${result===null?theme.accent:result?theme.correct:theme.wrong}`,borderRadius:10,color:theme.text,fontSize:18,fontWeight:700,width:100,textAlign:'center',margin:'0 4px'}}
            placeholder="?"
            autoFocus
          />
          {parts[1]}
        </div>
      </div>
      
      {result!==null&&!result&&<div style={{padding:12,background:`${theme.correct}20`,borderRadius:12,marginBottom:16,textAlign:'center'}}>
        <div style={{fontSize:13,color:theme.textLight,marginBottom:4}}>{showEng?'Correct answer:':(lang==='tr'?'Doğru cevap:':'Correct:')}</div>
        <div style={{fontSize:18,fontWeight:700,color:theme.correct}}>{s.blank}</div>
      </div>}
      
      {result===null?
        <button onClick={check} disabled={!answer.trim()} style={{width:'100%',padding:18,background:answer.trim()?theme.primary:theme.textMuted,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:answer.trim()?'pointer':'not-allowed'}}>
          {showEng?'Check':(lang==='tr'?'Kontrol Et':lang==='es'?'Verificar':lang==='zh'?'检查':'Check')}
        </button>
        :
        <button onClick={onNext} style={{width:'100%',padding:18,background:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
          {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')} →
        </button>
      }
    </div>
  );
}

// ========== LISTEN & ANSWER STEP ==========
function ListenAnswerStep({s,lang,showEng,onAnswer,result,onNext}){
  const[answer,setAnswer]=useState('');
  const[played,setPlayed]=useState(false);
  
  const play=()=>{AudioService.speak(s.audio);setPlayed(true)};
  
  const check=()=>{
    const trimmed=answer.trim();
    const lower=trimmed.toLowerCase();
    let ok=lower.startsWith(s.answerStart.toLowerCase())&&trimmed.length>s.answerStart.length+1;
    if(s.answerEnd)ok=ok&&lower.includes(s.answerEnd.toLowerCase());
    if(s.acceptable)ok=s.acceptable.some(a=>lower.includes(a.toLowerCase()));
    onAnswer(ok);
  };
  
  return(
    <div className="fade-in">
      <div style={{fontSize:16,color:theme.textLight,marginBottom:16,textAlign:'center'}}>
        {showEng?'🎧 Listen and answer':(lang==='tr'?'🎧 Dinle ve cevapla':lang==='es'?'🎧 Escucha y responde':lang==='zh'?'🎧 听并回答':'Listen and answer')}
      </div>
      
      <button onClick={play} className={played?'':'glow'} style={{width:'100%',padding:18,background:played?`${theme.primary}20`:theme.primary,border:'none',borderRadius:16,cursor:'pointer',color:played?theme.primary:'#fff',fontSize:18,fontWeight:700,marginBottom:20}}>
        🔊 {played?s.question:(showEng?'Listen to the question':(lang==='tr'?'Soruyu dinle':'Listen'))}
      </button>
      
      {played&&<div style={{padding:12,background:`${theme.accent}20`,borderRadius:12,marginBottom:16,fontSize:14,color:theme.accent,textAlign:'center'}}>{LANGS[lang]?.flag} {s.questionTr?.[lang]||''}</div>}
      
      <div style={{padding:12,background:`${theme.secondary}15`,borderRadius:12,marginBottom:16,fontSize:14,color:theme.secondary,textAlign:'center'}}>
        💡 {showEng?s.instruction:(s.instructionTr?.[lang]||s.instruction)}
      </div>
      
      <input 
        type="text" 
        value={answer}
        onChange={(e)=>setAnswer(e.target.value)}
        disabled={result!==null}
        placeholder={s.answerStart+" ..."}
        style={{width:'100%',padding:16,background:theme.bgCard,border:`2px solid ${result===null?'transparent':result?theme.correct:theme.wrong}`,borderRadius:14,color:theme.text,fontSize:18,marginBottom:20,fontFamily:'Nunito'}}
      />
      
      {result===null?
        <button onClick={check} disabled={!answer.trim()} style={{width:'100%',padding:18,background:answer.trim()?theme.primary:theme.textMuted,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:answer.trim()?'pointer':'not-allowed'}}>
          {showEng?'Check':(lang==='tr'?'Kontrol Et':lang==='es'?'Verificar':'Check')}
        </button>
        :
        <button onClick={onNext} style={{width:'100%',padding:18,background:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
          {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':'Continue')} →
        </button>
      }
    </div>
  );
}

// ========== COMPLETE STEP ==========
function CompleteStep({s,lang,showEng,xp,onDone}){
  const{user}=useContext(AppContext);
  const macroMsgs={
    tr:[`Harika iş çıkardın, ${user.name}! 🌸`,`Bir adım daha attın, ${user.name}!`,`Gurur duyuyorum seninle, ${user.name}!`,`İngilizce'de bir başarı daha, ${user.name}!`],
    es:[`¡Excelente trabajo, ${user.name}! 🌸`,`¡Un paso más, ${user.name}!`,`¡Estoy orgulloso de ti, ${user.name}!`,`¡Otro logro en inglés, ${user.name}!`],
    zh:[`做得好，${user.name}！🌸`,`又进步了一步，${user.name}！`,`我为你感到骄傲，${user.name}！`,`英语又一项成就，${user.name}！`],
    ko:[`잘했어요, ${user.name}! 🌸`,`한 걸음 더 나아갔어요, ${user.name}!`,`자랑스러워요, ${user.name}!`,`또 하나의 영어 성취, ${user.name}!`],
    ar:[`عمل رائع، ${user.name}! 🌸`,`خطوة أخرى، ${user.name}!`,`أنا فخور بك، ${user.name}!`,`إنجاز آخر بالإنجليزية، ${user.name}!`],
    en:[`Great job, ${user.name}! 🌸`,`Another step forward, ${user.name}!`,`I'm proud of you, ${user.name}!`,`Another English win, ${user.name}!`],
  };
  const msgList=macroMsgs[lang]||macroMsgs.en;
  const macroMsg=msgList[Math.floor(Math.random()*msgList.length)];
  
  return(
    <div className="fade-in" style={{textAlign:'center',paddingTop:30}}>
      <div style={{fontSize:80,marginBottom:10}}>🌸</div>
      <h2 style={{fontSize:24,fontWeight:800,marginBottom:8,color:theme.primary}}>{macroMsg}</h2>
      <p style={{fontSize:15,color:theme.textLight,marginBottom:25}}>{showEng?'Lesson Complete!':(lang==='tr'?'Ders Tamamlandı!':lang==='es'?'¡Lección Completada!':lang==='zh'?'课程完成！':lang==='ko'?'수업 완료!':lang==='ar'?'اكتمل الدرس!':'Lesson Complete!')}</p>
      <div style={{display:'flex',justifyContent:'center',gap:30,marginBottom:30}}>
        <div><div style={{fontSize:32,fontWeight:800,color:theme.secondary}}>+{xp}</div><div style={{fontSize:14,color:theme.textLight}}>XP</div></div>
        <div><div style={{fontSize:32}}>🔥</div><div style={{fontSize:14,color:theme.textLight}}>Streak!</div></div>
      </div>
      <div style={{background:theme.bgCard,borderRadius:20,padding:20,marginBottom:30,textAlign:'left'}}>
        <div style={{fontWeight:700,marginBottom:12,color:theme.textLight}}>{showEng?'You learned:':(lang==='tr'?'Öğrendiklerin:':lang==='es'?'Aprendiste:':lang==='zh'?'你学到了：':'You learned:')}</div>
        {s.learned.map((item,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:i<s.learned.length-1?`1px solid ${theme.textMuted}20`:'none'}}>
            <span style={{color:theme.correct}}>✓</span>
            <div>
              <div style={{fontWeight:600}}>{item}</div>
              {!showEng&&<div style={{fontSize:14,color:theme.primary}}>{s.learnedTr?.[lang]?.[i]||''}</div>}
            </div>
          </div>
        ))}
      </div>
      <button onClick={onDone} className="glow" style={{width:'100%',padding:18,background:theme.primary,border:'none',borderRadius:16,color:'#fff',fontSize:17,fontWeight:700,cursor:'pointer'}}>
        {showEng?'Continue':(lang==='tr'?'Devam':lang==='es'?'Continuar':lang==='zh'?'继续':'Continue')}
      </button>
    </div>
  );
}
